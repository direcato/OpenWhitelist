name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v3

      - run: chmod +x gradlew && ./gradlew build

      - name: Compute jar hash
        id: hash
        run: echo "sha256=$(sha256sum build/libs/OpenWhitelist.jar | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            build/libs/OpenWhitelist.jar \
            --title "OpenWhitelist v$VERSION" \
            --notes "See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."

      - name: Update latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest -y 2>/dev/null || true
          gh release create latest \
            build/libs/OpenWhitelist.jar \
            --title "OpenWhitelist (latest)" \
            --notes "Latest stable release. Download \`OpenWhitelist.jar\` into your server's \`plugins/\` folder and restart." \
            --latest
