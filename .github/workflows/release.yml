name: Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v3

      - run: chmod +x gradlew && ./gradlew build

      - name: Compute jar hash
        id: hash
        run: echo "sha256=$(sha256sum build/libs/OpenWhitelist.jar | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Check if release needs update
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ID=$(gh release view latest --json id -q '.id' 2>/dev/null || echo "")
          if [ -z "$ID" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            gh release download latest -p "OpenWhitelist.jar" -o /tmp/current.jar 2>/dev/null || true
            if [ -f /tmp/current.jar ]; then
              OLD=$(sha256sum /tmp/current.jar | cut -d' ' -f1)
              if [ "$OLD" = "${{ steps.hash.outputs.sha256 }}" ]; then
                echo "changed=false" >> "$GITHUB_OUTPUT"
              else
                echo "changed=true" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Upload release
        if: steps.check.outputs.changed == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "OpenWhitelist"
          artifacts: build/libs/OpenWhitelist.jar
          artifactContentType: application/java-archive
          body: "Download OpenWhitelist.jar into your server's plugins/ folder and restart."
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
