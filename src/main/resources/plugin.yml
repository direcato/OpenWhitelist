name: OpenWhitelist
version: ${version}
main: io.github.openwhitelist.OpenWhitelistPlugin
api-version: "1.21"
softdepend: [Floodgate]
authors: [direcato]
description: Whitelist plugin with Java & Bedrock (Geyser/Floodgate) support

commands:
  openw:
    description: OpenWhitelist main command
    usage: /openw <add|remove|list|reload|on|off|requests|accept>
    aliases: [owhitelist]

permissions:
  openwhitelist.admin:
    description: All OpenWhitelist permissions
    default: op
    children:
      openwhitelist.add: true
      openwhitelist.remove: true
      openwhitelist.list: true
      openwhitelist.reload: true
      openwhitelist.on: true
      openwhitelist.off: true
      openwhitelist.requests: true
      openwhitelist.accept: true
  openwhitelist.add:
    description: Add players to the whitelist
    default: op
  openwhitelist.remove:
    description: Remove players from the whitelist
    default: op
  openwhitelist.list:
    description: View the whitelist
    default: op
  openwhitelist.reload:
    description: Reload config and whitelist
    default: op
  openwhitelist.on:
    description: Enable the whitelist
    default: op
  openwhitelist.off:
    description: Disable the whitelist
    default: op
  openwhitelist.requests:
    description: View pending whitelist requests
    default: true
  openwhitelist.accept:
    description: Accept a whitelist request
    default: true
